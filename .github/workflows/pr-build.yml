name: PR Build

on:
  pull_request:
    branches:
      - develop

jobs:
  quality:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - name: Behavior tests
        run: npm run test:behavior

      - name: Production build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
